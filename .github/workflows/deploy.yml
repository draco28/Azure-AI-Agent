name: Deploy to Production

on:
  workflow_dispatch:  # manual trigger for production deployments

jobs:
  llm-evals:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run RAGAS evaluations
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_API_BASE: ${{ secrets.GLM_API_BASE }}
        run: uv run pytest tests/eval/ -v

  build-and-push:
    needs: llm-evals
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/azure-ai-agent:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/azure-ai-agent:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ai-agent-api
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/azure-ai-agent:${{ github.sha }}

      - name: Deploy UI to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ai-agent-ui
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/azure-ai-agent:${{ github.sha }}

      - name: Deploy MCP to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ai-agent-mcp
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/azure-ai-agent:${{ github.sha }}
