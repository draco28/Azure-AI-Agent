services:
  postgres:
    image: postgres:16
    container_name: azure-ai-agent-db
    environment:
      POSTGRES_DB: azure_ai_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
  
  redis:
    image: redis/redis-stack-server:latest
    container_name: azure-ai-agent-redis
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build: .
    command: /app/.venv/bin/uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  ui:
    build: .
    command: /app/.venv/bin/chainlit run src/ui/app.py --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - api

  mcp:
    build: .
    command: /app/.venv/bin/python -m src.mcp.server
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata: