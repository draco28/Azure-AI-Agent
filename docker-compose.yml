services:
  postgres:
    image: postgres:16
    container_name: azure-ai-agent-db
    environment:
      POSTGRES_DB: azure_ai_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: